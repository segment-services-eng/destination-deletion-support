name: Generate Deletion Support List

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate deletion support list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate

      - name: Commit updated deletion support list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deletion-support.md deletion-support.csv
          git diff --staged --quiet || git commit -m "Update deletion support list [skip ci]" && git push
