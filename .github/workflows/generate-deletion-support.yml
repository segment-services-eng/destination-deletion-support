name: Generate Deletion Support List

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

      - name: Generate deletion support list
        env:
          GH_TOKEN: ${{ secrets.SEGMENTIO_TOKEN }}
        run: npm run generate

      - name: Create PR if output changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deletion-support.md deletion-support.csv
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi
          BRANCH="auto/update-deletion-support-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Update deletion support list"
          git push -u origin "$BRANCH"
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$SHA -f state=success -f context=test -f description="Tests passed in generate workflow"
          gh pr create --title "Update deletion support list" --body "Automated daily regeneration of deletion-support.md and deletion-support.csv." --base main
          gh pr merge "$BRANCH" --squash --delete-branch --auto || gh pr merge "$BRANCH" --squash --delete-branch
