name: Generate Deletion Support List

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate deletion support list
        env:
          GH_TOKEN: ${{ secrets.SEGMENTIO_TOKEN }}
        run: npm run generate

      - name: Create PR if output changed
        env:
          GH_TOKEN: ${{ secrets.SEGMENTIO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deletion-support.md deletion-support.csv
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi
          BRANCH="auto/update-deletion-support-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "Update deletion support list"
          git push -u origin "$BRANCH"
          gh pr create --title "Update deletion support list" --body "Automated daily regeneration of deletion-support.md and deletion-support.csv." --base main
          gh pr merge "$BRANCH" --auto --squash
